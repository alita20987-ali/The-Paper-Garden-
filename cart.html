<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Your Cart - Paper Garden</title>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4" style="color: #d63384;">🛒 Your Shopping Cart</h2>
        <div class="card p-4 shadow-sm">
            <div id="cart-items-list">
                </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <h4>Total: RS <span id="cart-total-price">0</span></h4>
                <div>
                    
                    <a href="form.html" class="btn-buy">Proceed to Checkout</a>
                    <button class="btn-buy" onclick="clearFullCart()">Empty Cart 🗑️</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
